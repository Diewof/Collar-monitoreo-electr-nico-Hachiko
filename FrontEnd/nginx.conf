server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Re-resolve DNS on every request (needed when Railway redeploys services in parallel)
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Gzip para assets estáticos
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # SPA: todas las rutas desconocidas van a index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy reverso al backend (reemplaza el proxy de Vite en producción)
    location /api/ {
        set $backend ${BACKEND_URL};
        proxy_pass         $backend/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Proxy para actuator
    location /actuator/ {
        set $backend ${BACKEND_URL};
        proxy_pass $backend/actuator/;
        proxy_set_header Host $host;
    }
}

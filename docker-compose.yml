services:

  # ─── Base de datos ────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       collar
      POSTGRES_USER:     ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-admin}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Inicializa el schema en el primer arranque
      - ./src/main/resources/db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d collar"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ─── Cache Redis ──────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      sh -c "
        if [ -n '${REDIS_PASSWORD:-}' ]; then
          redis-server --requirepass '${REDIS_PASSWORD}'
        else
          redis-server
        fi
      "
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ─── Backend Spring Boot ──────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_URL:               jdbc:postgresql://db:5432/collar
      DB_USERNAME:          ${DB_USERNAME:-postgres}
      DB_PASSWORD:          ${DB_PASSWORD:-admin}
      REDIS_HOST:           redis
      REDIS_PORT:           6379
      REDIS_PASSWORD:       ${REDIS_PASSWORD:-}
      JWT_SECRET:           ${JWT_SECRET:-hachiko-portal-dev-secret-key-must-be-at-least-32-chars}
      JWT_EXPIRATION_MS:    ${JWT_EXPIRATION_MS:-86400000}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost}
      EMAIL_PROVIDER:       ${EMAIL_PROVIDER:-stub}
      RESEND_API_KEY:       ${RESEND_API_KEY:-}
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  # ─── Frontend React + Nginx ───────────────────────────────────────────────────
  frontend:
    build:
      context: FrontEnd
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
